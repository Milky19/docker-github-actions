name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Tag Docker Image
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)

          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${GIT_SHA} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest \
            .

      - name: Push Docker Image
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${GIT_SHA}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

  scan:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Scan Image
        run: |
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

  deploy:
    runs-on: self-hosted
    needs: scan

    steps:
      - name: Deploy Container
        run: |
          docker stop flask-app || true
          docker rm flask-app || true

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

          docker run -d --name flask-app -p 5000:5000 \
          ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest
