name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Login to DockerHub
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Step 3: Build & Tag Docker Image
      - name: Build & Tag Docker Image
        shell: bash
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${GIT_SHA} .

          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${GIT_SHA} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

      # Step 4: Push Docker Image
      - name: Push Docker Image
        shell: bash
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${GIT_SHA}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest


  scan:
    name: Security Scan with Trivy
    runs-on: self-hosted
    needs: build

    steps:
      # Install Trivy (Updated method)
      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      # Scan Docker Image
      - name: Scan latest Docker image
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest
          trivy image --exit-code 1 --severity CRITICAL ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest || echo "⚠️ Critical vulnerabilities found"


  deploy:
    name: Deploy on EC2
    runs-on: self-hosted
    needs: scan

    steps:
      - name: Deploy latest container
        shell: bash
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

          # Stop & remove old container safely
          docker rm -f flask-app || true

          # Run new container
          docker run -d --name flask-app -p 5000:5000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

          # Wait for app startup
          sleep 10

          # Health check (VERY IMPORTANT)
          curl -f http://localhost:5000 || exit 1

          # Cleanup unused images
          docker system prune -f
